bundle:
  name: cicd-pipeline

# In this CLI version, resources must wrap the targets and includes cleanly
resources:
  jobs:
    # This blank block tells the CLI that jobs are handled dynamically by the include array
    {}

targets:
  dev:
    workspace:
      host: https://dbc-207dff54-a451.cloud.databricks.com/
  prod:
    workspace:
      host: https://dbc-f2464af9-5e50.cloud.databricks.com/

# Move the file inclusion to the absolute bottom of the file
include:
  - "JOBS/*.yaml"
  - "JOBS/*.yml"