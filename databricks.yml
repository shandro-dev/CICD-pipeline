bundle:
  name: cicd pipleine

# Tell DABs to look into your JOBS folder for workflow configurations
resources:
  include:
    - JOBS/*.yaml
    - JOBS/*.yml

# Configure mapping for your Dev, QA, and Prod environments
targets:
  dev:
    workspace:
      host: https://dbc-207dff54-a451.cloud.databricks.com/ # Replace with your DEV host URL
      # In development mode, DABs automatically appends your username to the deployment path
    root: /Workspace//LIVE_dev
    file_path: /Workspace//LIVE_dev

  prod:
    workspace:
      host: https://dbc-f2464af9-5e50.cloud.databricks.com/ # Replace with your PROD host URL
      root: /Workspace//LIVE_prod    # Protected production execution path
      file_path: /Workspace//Live_prod