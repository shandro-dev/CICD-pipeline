
resources:
  jobs:
    CICD_test:
      name: CICD test
      tasks:
        - task_key: test
          notebook_task:
            notebook_path: ../SRC/ingest_raw
            source: WORKSPACE
          environment_key: Default
        - task_key: test2
          depends_on:
            - task_key: test
          notebook_task:
            notebook_path: ../SRC/transform_silver
            source: WORKSPACE
        - task_key: test3
          depends_on:
            - task_key: test2
          notebook_task:
            notebook_path: ../SRC/gold.ipynb
            source: WORKSPACE
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
