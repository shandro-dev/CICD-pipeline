resources:
  jobs:
    CICD_test_2:
      name: CICD test 2
      tasks:
        - task_key: task1
          notebook_task:
            notebook_path: /../SRC/ingest_raw
            source: WORKSPACE
          environment_key: Default

        - task_key: task2
          depends_on:
            - task_key: task1
          notebook_task:
            notebook_path: /../SRC/gold.ipynb
            source: WORKSPACE
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED