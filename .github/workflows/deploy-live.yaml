name: Deploy Live Folder

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure CLI
        run: |
          mkdir -p ~/.databricks

          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host=${DATABRICKS_HOST}
          token=${DATABRICKS_TOKEN}
          EOF
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Verify Config
        run: |
          echo "=== Databricks Config ==="
          cat ~/.databrickscfg | sed 's/token=.*/token=***hidden***/'

      - name: Check Environment Variables
        run: |
          echo "=== Host ==="
          echo "${{ secrets.DATABRICKS_HOST }}"
          echo ""
          echo "=== Host Length ==="
          echo "${#DATABRICKS_HOST}"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Check CLI Installation
        run: |
          echo "=== Python ==="
          python --version

          echo "=== Pip Package ==="
          pip show databricks-cli

          echo "=== CLI Path ==="
          which databricks

          echo "=== CLI Version ==="
          databricks -v || true

      - name: Show Repository Contents
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d

      - name: Test Databricks Connection
        run: |
          databricks workspace ls /

      - name: Upload Files
        run: |
          databricks workspace import_dir src /LIVE_dev/src --overwrite