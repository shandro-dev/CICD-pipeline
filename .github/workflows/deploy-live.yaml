name: Deploy REPO

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p ~/.databricks

          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host=$DATABRICKS_HOST
          token=$DATABRICKS_TOKEN
          EOF

      - name: Show Repo Structure
        run: |
          find . -type f | sort

      - name: Create LIVE_dev Folder
        run: |
          databricks workspace mkdirs /LIVE_dev

      - name: Import README
        run: |
          databricks workspace import README.md /LIVE_dev/README AUTO --overwrite || true

      - name: Import SRC Folder
        run: |
          databricks workspace import_dir CICD-pipeline /LIVE_dev/ --overwrite

      - name: Verify Deployment
        run: |
          echo "===== ROOT ====="
          databricks workspace ls /

          echo "===== LIVE_dev ====="
          databricks workspace ls /LIVE_dev

          echo "===== LIVE_dev/SRC ====="
          databricks workspace ls /LIVE_dev/SRC || true