name: Deploy REPO

on:
  push:
    branches:
      - dev
      - main

jobs:
  # =========================================================
  # DEVELOPMENT DEPLOYMENT (Workspace Sync)
  # =========================================================
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Industry Standard: Use the official Databricks CLI v2 installation action
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      # Create the directory safely. v2 native commands don't crash if it exists.
      - name: Create DEV Target Folder
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace mkdirs /LIVE_dev

      # Industry Standard Sync: Safely merges changes into the folder without deleting it
      - name: Sync REPO to DEV Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks workspace sync . /LIVE_dev --full-resync


  # =========================================================
  # PRODUCTION DEPLOYMENT (Workspace Sync)
  # =========================================================
  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Industry Standard: Use the official Databricks CLI v2 installation action
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      - name: Create PROD Target Folder
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks workspace mkdirs /LIVE_prod

      # Industry Standard Sync: Overwrites modified notebooks safely in-place.
      # No downtime for scheduled workflows or active Delta Live Tables.
      - name: Sync REPO to PROD Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks workspace sync . /LIVE_prod --full-resync