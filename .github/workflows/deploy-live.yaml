name: Deploy REPO

on:
  push:
    branches:
      - dev
      - qa
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # 1. FORCE SYNC files straight to your static target folder layout
      - name: Force Sync Files to LIVE_dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks workspace sync . /Workspace/LIVE_dev --full-history

      # 2. Deploy your workflow job infrastructure 
      - name: Deploy Asset Bundle Resources to DEV
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks bundle deploy -t dev

