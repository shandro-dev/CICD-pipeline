name: Deploy Live Folder

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p ~/.databricks

          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host=$DATABRICKS_HOST
          token=$DATABRICKS_TOKEN
          EOF

      - name: Verify Config
        run: |
          cat ~/.databrickscfg | sed 's/token=.*/token=***hidden***/'

      - name: Verify Secrets Exist
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "HOST LENGTH: ${#DATABRICKS_HOST}"
          echo "TOKEN LENGTH: ${#DATABRICKS_TOKEN}"

      - name: Test Connection
        run: |
          databricks workspace ls /

      - name: Deploy to LIVE_dev
        run: |
          databricks workspace import_dir src /LIVE_dev --overwrite