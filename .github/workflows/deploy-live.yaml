name: Deploy REPO

on:
  push:
    branches:
      - dev
      - qa
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Install the CLI
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # 2. FORCE COPY your code straight into the root /Workspace/LIVE_dev folder
      - name: Force Import Files to LIVE_dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks workspace import-dir . /Workspace/LIVE_dev -o

      # 3. Deploy your orchestration workflows
      - name: Deploy Asset Bundle Resources to DEV
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks bundle deploy -t dev

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # 2. FORCE COPY your code straight into the root /Workspace/LIVE_prod folder
      - name: Force Import Files to LIVE_prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks workspace import-dir . /Workspace/LIVE_prod -o

      # 3. Deploy your orchestration workflows
      - name: Deploy Asset Bundle Resources to PROD
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: |
          databricks bundle deploy -t prod