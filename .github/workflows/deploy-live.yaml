name: Deploy Live Folder

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p ~/.databricks

          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host=$DATABRICKS_HOST
          token=$DATABRICKS_TOKEN
          EOF

      - name: Verify Connection
        run: |
          databricks workspace ls /

      - name: Show Repository Structure
        run: |
          echo "===== REPOSITORY CONTENTS ====="
          pwd
          ls -la
          echo ""
          echo "===== SRC CONTENTS ====="
          find SRC

      - name: Show Workspace Before Deploy
        run: |
          echo "===== ROOT ====="
          databricks workspace ls / || true

          echo "===== LIVE_dev BEFORE ====="
          databricks workspace ls /LIVE_dev || true

      - name: Deploy to LIVE_dev
        run: |
          databricks workspace import_dir SRC /LIVE_dev --overwrite

      - name: Show Workspace After Deploy
        run: |
          echo "===== LIVE_dev AFTER ====="
          databricks workspace ls /LIVE_dev || true

          echo "===== ROOT AFTER ====="
          databricks workspace ls / || true